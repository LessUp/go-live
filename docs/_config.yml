title: Go-Live
description: >-
  Lightweight, high-performance WebRTC SFU Server — Built with Go + Pion WebRTC,
  supporting WHIP/WHEP streaming, room broadcast, recording and observability.
tagline: WebRTC SFU Server
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

repository: LessUp/go-live
show_downloads: true

url: "https://lessup.github.io"
baseurl: "/go-live"

lang: en
author: LessUp

twitter:
  card: summary_large_image
social:
  name: LessUp
  links:
    - https://github.com/LessUp

logo: /assets/favicon.svg

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

navigation:
  - title: Home
    url: /en/
    lang: en
  - title: 首页
    url: /zh/
    lang: zh
  - title: API
    url: /en/api.html
    lang: en
  - title: API
    url: /zh/api.html
    lang: zh
  - title: Design
    url: /en/design.html
    lang: en
  - title: 设计
    url: /zh/design.html
    lang: zh
  - title: Usage
    url: /en/usage.html
    lang: en
  - title: 使用
    url: /zh/usage.html
    lang: zh
  - title: Changelog
    url: /changelog.html
  - title: GitHub
    url: https://github.com/LessUp/go-live
    external: true

languages:
  - code: en
    name: English
    url: /en/
  - code: zh
    name: 中文
    url: /zh/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: "pages"
    values:
      seo:
        type: WebSite

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - "*.go"
  - go.mod
  - go.sum
  - Makefile
  - Dockerfile
  - docker-compose.yml
  - .gitignore
  - .github
  - changelog/CHANGELOG_GUIDE.md
  - changelog/README.md
  - changelog/RELEASE_WORKFLOW.md
  - changelog/templates/

include:
  - robots.txt

timezone: Asia/Shanghai

lsi: false
incremental: false
gist:
  noscript: false

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: all
  blanklines: false
  profile: false
