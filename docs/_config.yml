title: Go-Live
description: >-
  使用 Go + Pion WebRTC 构建的轻量级在线直播服务 — WHIP/WHEP 推拉流、SFU 转发、录制与 Prometheus 监控
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
repository: LessUp/go-live
show_downloads: false

# SEO & metadata
url: https://lessup.github.io
baseurl: /go-live
lang: zh-CN
author: LessUp

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Exclude non-doc files
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - "*.go"
  - "*.mod"
  - "*.sum"
