title: Go-Live
description: >-
  Lightweight, high-performance WebRTC SFU Server — Built with Go + Pion WebRTC,
  supporting WHIP/WHEP streaming, room broadcast, recording and observability.
tagline: WebRTC SFU Server
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Repository
repository: LessUp/go-live
show_downloads: false

# Site URL (for SEO and sitemap)
url: "https://lessup.github.io"
baseurl: "/go-live"

# Default language
lang: zh
author: LessUp

# Social / SEO
twitter:
  username: 
  card: summary
social:
  name: LessUp
  links:
    - https://github.com/LessUp

# Logo (optional, for SEO tag)
logo: /assets/favicon.svg

# Markdown configuration
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Navigation header links (Cayman theme)
navigation:
  - title: 首页
    url: /zh/
    lang: zh
  - title: Home
    url: /en/
    lang: en
  - title: API
    url: /api.html
  - title: 设计
    url: /design.html
    lang: zh
  - title: Design
    url: /en/design.html
    lang: en
  - title: Changelog
    url: /changelog.html
  - title: GitHub
    url: https://github.com/LessUp/go-live
    external: true

# Language switcher
languages:
  - code: zh
    name: 中文
    url: /zh/
  - code: en
    name: English
    url: /en/

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: "pages"
    values:
      seo:
        type: WebSite

# Exclude non-doc files from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - "*.go"
  - go.mod
  - go.sum
  - Makefile
  - Dockerfile
  - docker-compose.yml
  - .gitignore
  - .github
  - changelog/CHANGELOG_GUIDE.md
  - changelog/README.md
  - changelog/RELEASE_WORKFLOW.md
  - changelog/templates/

# Include these files
include:
  - robots.txt
  - sitemap.xml

# Timezone
timezone: Asia/Shanghai

# Build settings
lsi: false
incremental: false
gist:
  noscript: false

# HTML compression
compress_html:
  clippings: all
  comments: all
  endings: all
  startings: all
  blanklines: false
  profile: false

# Analytics (Google Analytics - optional)
# google_analytics: UA-XXXXXXXXX-X
