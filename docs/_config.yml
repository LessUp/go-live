# live-webrtc-go Documentation Site
# GitHub Pages + Jekyll configuration

title: live-webrtc-go
description: 使用 Go + Pion WebRTC 构建的轻量级在线直播服务
remote_theme: pages-themes/cayman@v0.2.0

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Navigation (used by includes/nav.html if overridden)
nav:
  - title: 首页
    url: /
  - title: 使用指南
    url: /usage
  - title: 设计说明
    url: /design

# SEO
url: ""
baseurl: "/go-live"
lang: zh-CN

# Exclude non-doc files
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
