name: Feature Request
description: Suggest a new feature
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe your idea.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like it to work?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - WebRTC/SFU
        - API/HTTP
        - Authentication
        - Recording/Upload
        - Metrics/Observability
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: checkboxes
    id: breaking
    attributes:
      label: Breaking Changes
      options:
        - label: This may require breaking API changes

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Use cases, examples, references
