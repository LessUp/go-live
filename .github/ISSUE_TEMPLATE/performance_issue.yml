name: Performance Issue
description: Report a performance problem
title: '[Performance]: '
labels: ['performance']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please provide performance details.

  - type: textarea
    id: description
    attributes:
      label: Issue Description
      description: What performance problem are you experiencing?
    validations:
      required: true

  - type: textarea
    id: metrics
    attributes:
      label: Current Metrics
      description: What are you observing?
      placeholder: |
        - Response time:
        - CPU usage:
        - Memory usage:
        - Concurrent connections:
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Performance
      description: What do you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: How can we reproduce this?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - WebRTC/SFU
        - Media Processing
        - API/HTTP
        - Recording
        - Other
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Hardware
      placeholder: e.g., 4 CPU, 8GB RAM

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant config (env vars)
      render: shell

  - type: textarea
    id: profiling
    attributes:
      label: Profiling Data
      description: CPU/memory profiles (pprof output)
