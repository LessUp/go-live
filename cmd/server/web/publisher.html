<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>推流控制台</title>
  <link rel="stylesheet" href="/web/app.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="actions" style="justify-content:space-between;grid-template-columns:1fr auto auto;">
        <a href="/web/index.html">← 返回首页</a>
        <a href="/web/player.html"><button type="button" class="button-secondary">去播放页</button></a>
        <a href="/web/records.html"><button type="button" class="button-secondary">录制列表</button></a>
      </div>
      <h1>推流（Publisher）</h1>
      <p>统一的推流页面：自动读取运行时配置，建立连接后展示本地预览，并支持停止与重试。</p>
    </section>

    <section class="panel">
      <div class="form-grid">
        <div class="field">
          <label for="room">房间名</label>
          <input id="room" value="demo" />
        </div>
        <div class="field">
          <label for="token">Token</label>
          <input id="token" placeholder="可选，服务端开启鉴权时填写" />
        </div>
      </div>
      <div class="actions" style="margin-top:16px;">
        <button id="start" type="button">开始推流</button>
        <button id="stop" type="button" class="button-secondary" disabled>停止推流</button>
      </div>
      <p id="status" class="status status--info" style="margin-top:16px;">准备就绪，等待开始推流。</p>
    </section>

    <section class="panel">
      <h2>本地预览</h2>
      <div class="video-frame">
        <video id="preview" autoplay playsinline muted></video>
      </div>
    </section>

    <section class="panel">
      <h2>连接日志</h2>
      <pre id="log" class="log"></pre>
    </section>
  </main>

  <script src="/web/app.js"></script>
  <script src="/web/webrtc.js"></script>
  <script>
    const { qs, initRoomAndToken } = window.GoLiveApp;

    const roomInput = qs('room');
    const tokenInput = qs('token');
    const startBtn = qs('start');
    const stopBtn = qs('stop');
    const statusEl = qs('status');
    const previewEl = qs('preview');
    const logEl = qs('log');

    initRoomAndToken(roomInput, tokenInput);

    const session = window.GoLiveWebRTC.createPublisherSession({
      roomInput,
      tokenInput,
      startBtn,
      stopBtn,
      statusEl,
      mediaEl: previewEl,
      logEl,
    });

    startBtn.addEventListener('click', () => session.start());
    stopBtn.addEventListener('click', () => session.stop('推流已停止'));
  </script>
</body>
</html>
